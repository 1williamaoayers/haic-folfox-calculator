name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Copy HTML into Android assets
        run: |
          cp "HAIC-FOLFOX-方案1-计算器.html" android/app/src/main/assets/index.html

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/HAIC-FOLFOX.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HAIC-FOLFOX-apk
          path: dist/HAIC-FOLFOX.apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest --title "HAIC-FOLFOX APK" --notes "自动构建的 Android APK。"
          fi
          gh release upload latest dist/HAIC-FOLFOX.apk --clobber
